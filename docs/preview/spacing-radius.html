<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); color: var(--fg-1); }
  .title { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 10px; }
  .row { display:flex; align-items:center; gap:16px; margin-bottom: 14px; }
  .r-block { background: var(--carrot-500); width: 56px; height: 56px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-family: var(--font-mono); font-weight: 600; }
  .r-name { font-size: 12px; font-weight: 600; color: var(--fg-1); }
  .r-spec { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body>
<div class="title">CORNER RADIUS</div>
<div class="row">
  <div class="r-block" style="border-radius: 4px">4</div>
  <div class="r-block" style="border-radius: 8px">8</div>
  <div class="r-block" style="border-radius: 12px">12</div>
  <div class="r-block" style="border-radius: 16px">16</div>
  <div class="r-block" style="border-radius: 20px">20</div>
  <div class="r-block" style="border-radius: 999px">pill</div>
</div>
<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; font-size: 11px; color: var(--fg-3); margin-top: 4px;">
  <div><b style="color:var(--fg-1)">4</b> · tight chips, tags</div>
  <div><b style="color:var(--fg-1)">8</b> · buttons (sm)</div>
  <div><b style="color:var(--fg-1)">12</b> · default cards, inputs, buttons</div>
  <div><b style="color:var(--fg-1)">16</b> · large cards</div>
  <div><b style="color:var(--fg-1)">20</b> · bottom sheets, modals</div>
  <div><b style="color:var(--fg-1)">pill</b> · chips, avatars, FAB</div>
</div>
</body></html>
