<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:24px; margin-bottom:16px; }
  .logo-wrap { display:flex; align-items:center; gap:12px; }
  .cap { font-size: 10px; font-family: var(--font-mono); color: var(--fg-4); width: 80px; flex-shrink:0; }
</style></head>
<body>
<div class="row">
  <div class="cap">WORDMARK</div>
  <img src="../assets/logo.svg" height="44"/>
</div>
<div class="row">
  <div class="cap">APP ICON</div>
  <img src="../assets/app-icon.svg" width="72" height="72" style="border-radius: 18px; box-shadow: 0 4px 12px rgba(0,0,0,.1)"/>
  <img src="../assets/app-icon.svg" width="48" height="48" style="border-radius: 12px"/>
  <img src="../assets/app-icon.svg" width="32" height="32" style="border-radius: 8px"/>
</div>
<div class="row">
  <div class="cap">ON DARK</div>
  <div style="background:#191F28; padding:14px 18px; border-radius: 12px; display:flex; align-items:center; gap:12px;">
    <img src="../assets/app-icon.svg" height="28"/>
    <span style="color:#fff; font-weight: 800; font-size: 18px; letter-spacing: -0.02em;">셔틀트래커</span>
  </div>
</div>
</body></html>
