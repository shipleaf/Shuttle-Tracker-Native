<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .title { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 12px; }
  .row { display:flex; align-items:center; gap: 14px; margin-bottom: 10px; }
  .bar { background: var(--carrot-200); height: 16px; border-radius: 4px; }
  .label { width: 60px; font-size: 11px; font-weight: 600; color: var(--fg-1); font-family: var(--font-mono); }
  .spec { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style></head>
<body>
<div class="title">SPACING · 4pt grid</div>
<div class="row"><div class="label">s-1</div><div class="bar" style="width:4px"></div><div class="spec">4px · icon gaps</div></div>
<div class="row"><div class="label">s-2</div><div class="bar" style="width:8px"></div><div class="spec">8px · chip gaps</div></div>
<div class="row"><div class="label">s-3</div><div class="bar" style="width:12px"></div><div class="spec">12px · list item internal</div></div>
<div class="row"><div class="label">s-4</div><div class="bar" style="width:16px"></div><div class="spec">16px · card padding, page gutter</div></div>
<div class="row"><div class="label">s-5</div><div class="bar" style="width:20px"></div><div class="spec">20px · list padding</div></div>
<div class="row"><div class="label">s-6</div><div class="bar" style="width:24px"></div><div class="spec">24px · section</div></div>
<div class="row"><div class="label">s-7</div><div class="bar" style="width:32px"></div><div class="spec">32px · hero gutter</div></div>
</body></html>
