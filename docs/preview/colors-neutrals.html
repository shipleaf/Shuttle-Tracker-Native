<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; }
  .swatch { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 56px; display:flex; align-items:flex-end; padding:8px; font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
  .meta { padding: 6px 8px; font-size: 11px; line-height: 1.3; background: #fff; }
  .meta .name { font-weight: 700; }
  .meta .hex { font-family: var(--font-mono); color: var(--fg-3); font-size: 10px; }
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#FFFFFF;color:#191F28;border-bottom:1px solid #eee">00</div><div class="meta"><div class="name">Gray 00</div><div class="hex">#FFFFFF</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FAFAFA;color:#191F28">50</div><div class="meta"><div class="name">Gray 50</div><div class="hex">#FAFAFA</div></div></div>
  <div class="swatch"><div class="chip" style="background:#F2F3F6;color:#191F28">100</div><div class="meta"><div class="name">Gray 100</div><div class="hex">#F2F3F6</div></div></div>
  <div class="swatch"><div class="chip" style="background:#E8EAED;color:#191F28">200</div><div class="meta"><div class="name">Gray 200</div><div class="hex">#E8EAED</div></div></div>
  <div class="swatch"><div class="chip" style="background:#D1D6DB;color:#191F28">300</div><div class="meta"><div class="name">Gray 300</div><div class="hex">#D1D6DB</div></div></div>
  <div class="swatch"><div class="chip" style="background:#B0B8C1;color:#fff">400</div><div class="meta"><div class="name">Gray 400</div><div class="hex">#B0B8C1</div></div></div>
  <div class="swatch"><div class="chip" style="background:#8B95A1;color:#fff">500</div><div class="meta"><div class="name">Gray 500</div><div class="hex">#8B95A1</div></div></div>
  <div class="swatch"><div class="chip" style="background:#6B7684;color:#fff">600</div><div class="meta"><div class="name">Gray 600</div><div class="hex">#6B7684</div></div></div>
  <div class="swatch"><div class="chip" style="background:#4E5968;color:#fff">700</div><div class="meta"><div class="name">Gray 700</div><div class="hex">#4E5968</div></div></div>
  <div class="swatch"><div class="chip" style="background:#333D4B;color:#fff">800</div><div class="meta"><div class="name">Gray 800</div><div class="hex">#333D4B</div></div></div>
</div>
</body></html>
