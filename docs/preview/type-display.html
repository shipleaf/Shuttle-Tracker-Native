<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); color: var(--fg-1); }
  .row { display:flex; align-items:baseline; gap:16px; padding: 8px 0; border-bottom: 1px solid var(--divider); }
  .row:last-child { border-bottom: 0; }
  .label { width: 90px; font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); font-weight: 500; flex-shrink: 0; }
  .sample { flex: 1; }
  .spec { font-size: 10px; font-family: var(--font-mono); color: var(--fg-4); flex-shrink: 0; }
</style></head>
<body>
  <div class="row"><div class="label">display</div><div class="sample t-display">셔틀이 도착해요</div><div class="spec">32/40 · 700</div></div>
  <div class="row"><div class="label">h1</div><div class="sample t-h1">실시간 위치 공유</div><div class="spec">24/32 · 700</div></div>
  <div class="row"><div class="label">h2</div><div class="sample t-h2">1호차 · 학교 ↔ 시청</div><div class="spec">20/28 · 700</div></div>
  <div class="row"><div class="label">h3</div><div class="sample t-h3">다음 정류장 안내</div><div class="spec">18/26 · 700</div></div>
  <div class="row"><div class="label">title</div><div class="sample t-title">효덕초 후문</div><div class="spec">16/22 · 600</div></div>
</body></html>
