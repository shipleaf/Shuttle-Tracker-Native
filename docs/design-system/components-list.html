<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="../ui_kits/app/app.css"/>

</style></head>

  <div class="list-item" style="padding:12px 16px;">
    <div class="avatar" style="background:#3182F6">승</div>

  <div class="list-item" style="padding:12px 16px;">
    <div class="avatar" style="background:#A855F7">유</div>
    <div class="body">
      <div class="title">유리</div>
      <div class="subtitle">오프라인 · 어제 18:42</div>
    </div>

  </div>
