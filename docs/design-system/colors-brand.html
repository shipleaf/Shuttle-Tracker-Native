<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; }
  .swatch { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 60px; display:flex; align-items:flex-end; padding:8px; color:#fff; font-size: 11px; font-weight: 600; font-family: var(--font-mono); letter-spacing: 0; }
  .meta { padding: 6px 8px; font-size: 11px; line-height: 1.3; background: #fff; }
  .meta .name { font-weight: 700; color: var(--fg-1); }
  .meta .hex { font-family: var(--font-mono); color: var(--fg-3); font-size: 10px; }
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#FFF4EC;color:#8F3206">50</div><div class="meta"><div class="name">Carrot 50</div><div class="hex">#FFF4EC</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFE4D0;color:#8F3206">100</div><div class="meta"><div class="name">Carrot 100</div><div class="hex">#FFE4D0</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFC8A1;color:#8F3206">200</div><div class="meta"><div class="name">Carrot 200</div><div class="hex">#FFC8A1</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFA66B">300</div><div class="meta"><div class="name">Carrot 300</div><div class="hex">#FFA66B</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FF8A3D">400</div><div class="meta"><div class="name">Carrot 400</div><div class="hex">#FF8A3D</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FF6F0F">500 · primary</div><div class="meta"><div class="name">Carrot 500</div><div class="hex">#FF6F0F</div></div></div>
  <div class="swatch"><div class="chip" style="background:#E8580F">600</div><div class="meta"><div class="name">Carrot 600</div><div class="hex">#E8580F</div></div></div>
  <div class="swatch"><div class="chip" style="background:#C2460A">700</div><div class="meta"><div class="name">Carrot 700</div><div class="hex">#C2460A</div></div></div>
  <div class="swatch"><div class="chip" style="background:#8F3206">800</div><div class="meta"><div class="name">Carrot 800</div><div class="hex">#8F3206</div></div></div>
  <div class="swatch"><div class="chip" style="background:#5C2003">900</div><div class="meta"><div class="name">Carrot 900</div><div class="hex">#5C2003</div></div></div>
</div>
</body></html>
