<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:#FAFAFA; font-family: var(--font-sans); color: var(--fg-1); }
  .title { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); margin-bottom: 12px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { background:#fff; padding: 14px; border-radius: 12px; font-size: 11px; color: var(--fg-2); }
  .card .name { font-size: 11px; font-weight: 700; color: var(--fg-1); margin-bottom: 6px; font-family: var(--font-mono); }
  .card .sh-demo { height: 40px; background: #fff; border-radius: 8px; margin-top: 8px; }
</style></head>
<body>
<div class="title">ELEVATION · 3 levels</div>
<div class="grid">
  <div class="card">
    <div class="name">shadow-1</div>
    <div>cards, list rows, chips</div>
    <div class="sh-demo" style="box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.02)"></div>
  </div>
  <div class="card">
    <div class="name">shadow-2</div>
    <div>floating buttons, search</div>
    <div class="sh-demo" style="box-shadow: 0 4px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04)"></div>
  </div>
  <div class="card">
    <div class="name">shadow-3</div>
    <div>bottom sheet, modals</div>
    <div class="sh-demo" style="box-shadow: 0 12px 32px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.06)"></div>
  </div>
</div>
</body></html>
